<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1035">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>StudyFlow — Planificador de Estudio</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════ */
:root {
  --bg:        #0f0e1a;
  --bg2:       #161525;
  --panel:     #1e1c30;
  --card:      #252340;
  --card2:     #2d2a4a;
  --border:    #3a3660;
  --border2:   #4a4680;
  --text:      #eeeaf8;
  --text2:     #9b96c0;
  --text3:     #5c5880;

  --purple:    #7c5cfc;
  --purple2:   #9b7dff;
  --purple-g:  rgba(124,92,252,.15);
  --pink:      #f05d8e;
  --pink-g:    rgba(240,93,142,.15);
  --cyan:      #3dd9d6;
  --cyan-g:    rgba(61,217,214,.12);
  --green:     #4ade80;
  --green-g:   rgba(74,222,128,.12);
  --yellow:    #fbbf24;
  --yellow-g:  rgba(251,191,36,.12);
  --red:       #f87171;
  --red-g:     rgba(248,113,113,.12);
  --orange:    #fb923c;

  /* Subject colors */
  --subj-0: #7c5cfc; --subj-1: #f05d8e; --subj-2: #3dd9d6;
  --subj-3: #4ade80; --subj-4: #fbbf24; --subj-5: #fb923c;
  --subj-6: #60a5fa; --subj-7: #a78bfa;

  --r:      14px;
  --r-sm:   8px;
  --r-lg:   20px;
  --shadow: 0 4px 24px rgba(0,0,0,.5);
  --trans:  0.18s ease;
  --sidebar-w: 230px;
}

* { box-sizing:border-box; margin:0; padding:0; border:none; outline:none; font-family:'Nunito',sans-serif; }
body { background:var(--bg); color:var(--text); height:100vh; overflow:hidden; }
button { cursor:pointer; background:none; color:inherit; font-family:inherit; }
input,select,textarea { font-family:inherit; color:var(--text); }
a { color:inherit; text-decoration:none; }

/* ═══════════════════════════════════════
   BACKGROUND STARS
═══════════════════════════════════════ */
#stars {
  position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;
}
#stars::before,#stars::after {
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 70%, rgba(255,255,255,.3) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 55% 15%, rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 45%, rgba(255,255,255,.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 90%, rgba(255,255,255,.2) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 65% 55%, rgba(255,255,255,.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 25%, rgba(255,255,255,.25) 0%, transparent 100%);
}

/* ═══════════════════════════════════════
   LAYOUT
═══════════════════════════════════════ */
#loginScreen {
  position:fixed;inset:0;z-index:1000;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg, #0f0e1a 0%, #1a1035 50%, #0f1a2e 100%);
  padding:20px;
}
#app { display:none; width:100%;height:100vh;overflow:hidden;position:relative;z-index:1; }
#app.visible { display:flex; }

.sidebar {
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--panel);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  height:100vh;
  transition:width var(--trans),min-width var(--trans);
  position:relative;z-index:10;
  flex-shrink:0;
}
.main {
  flex:1;overflow:hidden;
  display:flex;flex-direction:column;
  min-width:0;
}
.page-content {
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:0;position:relative;
  -webkit-overflow-scrolling:touch;
}

/* ═══════════════════════════════════════
   LOGIN
═══════════════════════════════════════ */
.login-box {
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:48px 40px;
  width:100%;max-width:420px;
  box-shadow:0 8px 48px rgba(124,92,252,.25);
  animation:loginIn .5s cubic-bezier(.2,.8,.4,1);
  position:relative;
}
@keyframes loginIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}

.login-logo {
  display:flex;align-items:center;gap:14px;margin-bottom:32px;
}
.login-logo-icon {
  width:52px;height:52px;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;
  box-shadow:0 4px 20px rgba(124,92,252,.4);
}
.login-logo-text { font-size:26px;font-weight:900;letter-spacing:-.5px; }
.login-logo-text span { color:var(--purple2); }
.login-tagline { font-size:13px;color:var(--text2);margin-bottom:28px;line-height:1.5; }

.login-tabs {
  display:flex;gap:4px;
  background:var(--bg2);
  border-radius:var(--r-sm);
  padding:4px;
  margin-bottom:24px;
}
.login-tab {
  flex:1;padding:8px;border-radius:6px;
  font-size:12px;font-weight:700;
  color:var(--text2);
  transition:all var(--trans);
  text-align:center;
}
.login-tab.active { background:var(--purple);color:#fff; }

.login-field { margin-bottom:16px; }
.login-label {
  display:block;font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;
  color:var(--text2);margin-bottom:6px;
}
.login-input {
  width:100%;background:var(--card);
  border:1.5px solid var(--border);
  border-radius:var(--r-sm);
  padding:12px 16px;color:var(--text);font-size:14px;
  transition:border-color var(--trans),box-shadow var(--trans);
}
.login-input:focus {
  border-color:var(--purple);
  box-shadow:0 0 0 3px rgba(124,92,252,.2);
}
.login-error {
  color:var(--red);font-size:12px;
  padding:8px 12px;background:var(--red-g);
  border-radius:var(--r-sm);margin-top:8px;display:none;
}
.login-btn {
  width:100%;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:#fff;border-radius:var(--r-sm);
  padding:14px;font-size:15px;font-weight:800;
  margin-top:8px;
  box-shadow:0 4px 20px rgba(124,92,252,.4);
  transition:all var(--trans);
}
.login-btn:hover { transform:translateY(-2px);box-shadow:0 8px 28px rgba(124,92,252,.5); }
.login-divider { display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--text3);font-size:12px; }
.login-divider::before,.login-divider::after { content:'';flex:1;height:1px;background:var(--border); }
.role-selector { display:flex;gap:6px;margin-bottom:16px; }
.role-chip {
  flex:1;padding:8px;border-radius:var(--r-sm);
  border:1.5px solid var(--border);
  text-align:center;font-size:12px;font-weight:700;
  color:var(--text2);transition:all var(--trans);cursor:pointer;
}
.role-chip.sel { border-color:var(--purple);background:var(--purple-g);color:var(--purple2); }

/* ═══════════════════════════════════════
   TOPBAR
═══════════════════════════════════════ */
.topbar {
  height:60px;background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 24px;gap:10px;flex-shrink:0;
}
.tb-title { font-size:17px;font-weight:800;flex:1; }
.tb-actions { display:flex;align-items:center;gap:8px; }
.mob-menu { display:none;width:36px;height:36px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--card);align-items:center;justify-content:center;font-size:16px;flex-shrink:0; }

/* ═══════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════ */
.sb-logo {
  padding:18px 16px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sb-logo-icon {
  width:36px;height:36px;min-width:36px;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;
}
.sb-logo-text { font-size:17px;font-weight:900;letter-spacing:-.3px; }
.sb-logo-text span { color:var(--purple2); }

.sb-nav { flex:1;overflow-y:auto;padding:12px 8px;display:flex;flex-direction:column;gap:2px; }
.nav-item {
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:var(--r-sm);
  font-size:13.5px;font-weight:700;color:var(--text2);
  transition:all var(--trans);width:100%;text-align:left;
  position:relative;
}
.nav-item:hover { background:var(--card);color:var(--text); }
.nav-item.active { background:var(--purple-g);color:var(--purple2); }
.nav-item.active .ni-icon { color:var(--purple2); }
.ni-icon { font-size:17px;min-width:22px;text-align:center;flex-shrink:0; }
.ni-label { flex:1; }
.sb-section {
  font-size:10px;font-weight:800;
  text-transform:uppercase;letter-spacing:1.5px;
  color:var(--text3);
  padding:14px 12px 4px;
}
.sb-bottom {
  padding:12px;border-top:1px solid var(--border);flex-shrink:0;
  display:flex;flex-direction:column;gap:6px;
}
.user-chip {
  display:flex;align-items:center;gap:10px;
  padding:10px;border-radius:var(--r-sm);
  background:var(--card);
}
.user-avatar {
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:#fff;flex-shrink:0;
}
.user-name { font-size:12.5px;font-weight:800; }
.user-role {
  font-size:10px;color:var(--text2);font-weight:700;
  text-transform:uppercase;letter-spacing:.5px;
}
.logout-btn {
  display:flex;align-items:center;gap:8px;
  padding:9px 12px;border-radius:var(--r-sm);
  font-size:12.5px;font-weight:700;color:var(--text2);
  transition:all var(--trans);width:100%;
}
.logout-btn:hover { color:var(--red);background:var(--red-g); }
.sb-credit {
  font-size:9px;color:var(--text3);text-align:center;
  line-height:1.6;border-top:1px solid var(--border);padding-top:8px;margin-top:2px;
}
.sb-credit span { color:var(--purple2);font-weight:800; }

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.btn-primary {
  display:flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:#fff;border-radius:var(--r-sm);
  padding:9px 18px;font-size:13px;font-weight:800;
  box-shadow:0 2px 12px rgba(124,92,252,.3);
  transition:all var(--trans);white-space:nowrap;
}
.btn-primary:hover { transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,92,252,.45); }
.btn-sec {
  display:flex;align-items:center;gap:6px;
  background:var(--card);color:var(--text2);
  border:1.5px solid var(--border);border-radius:var(--r-sm);
  padding:8px 14px;font-size:12.5px;font-weight:700;
  transition:all var(--trans);white-space:nowrap;
}
.btn-sec:hover { border-color:var(--purple);color:var(--purple2); }

/* ═══════════════════════════════════════
   MODAL
═══════════════════════════════════════ */
.modal-overlay {
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  backdrop-filter:blur(8px);z-index:500;
  display:flex;align-items:center;justify-content:center;
  padding:20px;opacity:0;pointer-events:none;transition:opacity .25s;
}
.modal-overlay.open { opacity:1;pointer-events:all; }
.modal {
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--r-lg);
  width:100%;max-width:500px;
  max-height:90vh;overflow-y:auto;
  transform:translateY(16px);transition:transform .25s cubic-bezier(.2,.8,.4,1);
  box-shadow:0 8px 48px rgba(0,0,0,.6);
}
.modal-overlay.open .modal { transform:none; }
.modal-header {
  display:flex;align-items:center;justify-content:space-between;
  padding:24px 24px 0;
}
.modal-title { font-size:18px;font-weight:900; }
.modal-close {
  width:32px;height:32px;border-radius:var(--r-sm);
  border:1.5px solid var(--border);background:var(--card);
  color:var(--text2);font-size:16px;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--trans);
}
.modal-close:hover { background:var(--red-g);color:var(--red);border-color:var(--red); }
.modal-body { padding:20px 24px 24px; }
.form-group { margin-bottom:18px; }
.form-label {
  display:block;font-size:11px;font-weight:800;
  text-transform:uppercase;letter-spacing:1px;
  color:var(--text2);margin-bottom:7px;
}
.form-input,.form-select,.form-textarea {
  width:100%;background:var(--card);
  border:1.5px solid var(--border);border-radius:var(--r-sm);
  padding:11px 14px;color:var(--text);font-size:14px;font-weight:600;
  transition:border-color var(--trans),box-shadow var(--trans);
}
.form-input:focus,.form-select:focus,.form-textarea:focus {
  border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,92,252,.15);
}
.form-select option { background:var(--card2); }
.form-textarea { resize:vertical;min-height:80px; }
.form-row { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
.btn-submit {
  width:100%;
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:#fff;border-radius:var(--r-sm);
  padding:14px;font-size:15px;font-weight:800;
  box-shadow:0 4px 16px rgba(124,92,252,.35);
  transition:all var(--trans);
}
.btn-submit:hover { transform:translateY(-1px);box-shadow:0 8px 24px rgba(124,92,252,.45); }
.diff-picker { display:flex;gap:6px; }
.diff-btn {
  flex:1;padding:8px;border-radius:var(--r-sm);
  border:1.5px solid var(--border);
  font-size:12px;font-weight:800;color:var(--text2);
  transition:all var(--trans);text-align:center;
}
.diff-btn.sel { border-color:var(--purple);background:var(--purple-g);color:var(--purple2); }

/* ═══════════════════════════════════════
   DASHBOARD / HOME
═══════════════════════════════════════ */
.home-page { padding:24px;display:flex;flex-direction:column;gap:20px; }

.hello-banner {
  background:linear-gradient(135deg, rgba(124,92,252,.2), rgba(240,93,142,.15));
  border:1px solid rgba(124,92,252,.3);
  border-radius:var(--r-lg);
  padding:24px 28px;
  display:flex;align-items:center;gap:20px;
  position:relative;overflow:hidden;
}
.hello-banner::before {
  content:'🌟';position:absolute;right:24px;top:50%;transform:translateY(-50%);
  font-size:64px;opacity:.15;
}
.hello-text h2 { font-size:22px;font-weight:900;margin-bottom:4px; }
.hello-text p { font-size:13px;color:var(--text2); }

.stats-grid {
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
}
.stat-card {
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--r);padding:18px;
  display:flex;flex-direction:column;gap:6px;
  position:relative;overflow:hidden;
}
.stat-card::after {
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:var(--accent-line);
}
.stat-value { font-size:28px;font-weight:900;letter-spacing:-1px; }
.stat-label { font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px; }
.stat-icon { font-size:20px;margin-bottom:2px; }

/* Subject progress bars */
.section-title {
  font-size:15px;font-weight:900;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.subj-progress-list { display:flex;flex-direction:column;gap:12px; }
.subj-progress-item {
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--r);padding:14px 18px;
}
.subj-progress-header {
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.subj-name {
  display:flex;align-items:center;gap:8px;
  font-size:13.5px;font-weight:800;
}
.subj-dot { width:10px;height:10px;border-radius:50%;flex-shrink:0; }
.subj-pct { font-size:12px;font-weight:800;color:var(--text2); }
.progress-bar-wrap {
  height:8px;background:var(--card2);border-radius:4px;overflow:hidden;
}
.progress-bar-fill {
  height:100%;border-radius:4px;transition:width .8s cubic-bezier(.2,.8,.4,1);
}
.subj-meta { display:flex;justify-content:space-between;margin-top:6px; }
.subj-meta span { font-size:11px;color:var(--text3);font-weight:600; }

/* ═══════════════════════════════════════
   TASKS PAGE
═══════════════════════════════════════ */
.tasks-page { padding:20px;display:flex;flex-direction:column;gap:16px; }
.task-card {
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--r);padding:16px 18px;
  display:flex;align-items:flex-start;gap:14px;
  transition:all var(--trans);cursor:pointer;
  position:relative;overflow:hidden;
}
.task-card::before {
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:4px;background:var(--task-color,var(--purple));
}
.task-card:hover { border-color:var(--border2);transform:translateX(2px); }
.task-card.done-card { opacity:.55; }
.task-card.done-card .task-title { text-decoration:line-through;color:var(--text2); }
.task-check {
  width:22px;height:22px;border-radius:6px;
  border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
  transition:all var(--trans);
  background:none;
}
.task-check.checked { background:var(--purple);border-color:var(--purple); }
.task-body { flex:1;min-width:0; }
.task-title { font-size:14px;font-weight:800;margin-bottom:5px; }
.task-chips { display:flex;flex-wrap:wrap;gap:5px; }
.chip {
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:20px;
  font-size:11px;font-weight:700;
}
.chip-subj { background:var(--chip-bg,var(--purple-g));color:var(--chip-color,var(--purple2)); }
.chip-date { background:var(--card2);color:var(--text2); }
.chip-diff { background:var(--diff-bg);color:var(--diff-color); }
.chip-time { background:var(--cyan-g);color:var(--cyan); }
.chip-done { background:var(--green-g);color:var(--green); }
.task-actions { display:flex;gap:6px;margin-left:auto;flex-shrink:0; }
.task-action-btn {
  width:28px;height:28px;border-radius:var(--r-sm);
  border:1.5px solid var(--border);background:var(--card);
  color:var(--text2);font-size:13px;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--trans);
}
.task-action-btn:hover { border-color:var(--red);color:var(--red);background:var(--red-g); }
.empty-state {
  text-align:center;padding:60px 20px;
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.empty-icon { font-size:56px;opacity:.4; }
.empty-title { font-size:17px;font-weight:800;color:var(--text2); }
.empty-sub { font-size:13px;color:var(--text3); }

/* ═══════════════════════════════════════
   PLAN PAGE
═══════════════════════════════════════ */
.plan-page { padding:20px;display:flex;flex-direction:column;gap:16px; }

/* View tabs */
.plan-tabs {
  display:flex;gap:4px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--r-sm);
  padding:4px;
  width:fit-content;
}
.plan-tab {
  padding:7px 18px;border-radius:6px;
  font-size:13px;font-weight:800;color:var(--text2);
  transition:all var(--trans);
}
.plan-tab.active {
  background:linear-gradient(135deg,var(--purple),var(--pink));
  color:#fff;
  box-shadow:0 2px 10px rgba(124,92,252,.35);
}

/* Monthly calendar grid */
.month-grid {
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:4px;
}
.month-header-cell {
  text-align:center;font-size:11px;font-weight:800;
  color:var(--text3);text-transform:uppercase;
  padding:6px 0;
}
.month-cell {
  min-height:72px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:var(--r-sm);padding:6px;
  display:flex;flex-direction:column;gap:3px;
  transition:border-color var(--trans);
  position:relative;
}

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc,
         onSnapshot, query, orderBy, setDoc, where } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAlW7S4tpn4YYkoov1Uq93KFmT8cY8Uzms",
  authDomain: "app-reserva-de-portatiles.firebaseapp.com",
  databaseURL: "https://app-reserva-de-portatiles-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "app-reserva-de-portatiles",
  storageBucket: "app-reserva-de-portatiles.firebasestorage.app",
  messagingSenderId: "170712420790",
  appId: "1:170712420790:web:e52d1831be2985c6af3117"
};

let db = null;
let fbActive = false;

try {
  const app = initializeApp(firebaseConfig, 'studyflow');
  db = getFirestore(app);
  fbActive = true;

  // Users collection listener
  onSnapshot(collection(db, 'usuarios_sf'), snap => {
    window.SF.users = [];
    snap.forEach(d => window.SF.users.push({id:d.id,...d.data()}));
    if(window.SF.currentUser) {
      const updated = window.SF.users.find(u => u.id === window.SF.currentUser.id);
      if(updated) window.SF.currentUser = updated;
    }
  });

  // Tasks listener for current user (set up after login)
  window.setupTaskListener = (userId) => {
    const tq = query(collection(db, 'tareas_sf'), where('userId','==',userId), orderBy('createdAt','desc'));
    onSnapshot(tq, snap => {
      window.SF.tasks = [];
      snap.forEach(d => window.SF.tasks.push({id:d.id,...d.data()}));
      if(window.SF.currentUser) {
        window.App.renderCurrent();
      }
    });
  };

  // Clases listener (set up after login)
  window.setupClassListener = (userId, role) => {
    let cq;
    if(role === 'teacher'){
      cq = query(collection(db,'clases_sf'), where('profesorId','==',userId));
    } else {
      cq = query(collection(db,'clases_sf'), where('alumnos','array-contains',userId));
    }
    onSnapshot(cq, snap => {
      window.SF.classes = [];
      snap.forEach(d => window.SF.classes.push({id:d.id,...d.data()}));
      // Also load tasks assigned BY teacher TO this student
      if(role === 'student' && window.SF.currentUser) {
        window.App.renderCurrent();
      }
      if(role === 'teacher' && window.SF.currentUser) {
        window.App.renderCurrent();
      }
    }, err => console.warn('[FB] clases error:', err.message));

    // For teachers: also listen to ALL tasks assigned by them
    if(role === 'teacher'){
      const tq2 = query(collection(db,'tareas_sf'), where('asignadaPor','==',userId));
      onSnapshot(tq2, snap => {
        window.SF.assignedTasks = [];
        snap.forEach(d => window.SF.assignedTasks.push({id:d.id,...d.data()}));
        if(window.SF.currentUser) window.App.renderCurrent();
      }, err => console.warn('[FB] assigned tasks error:', err.message));
    }

    // For students: also listen to tasks assigned TO them
    if(role === 'student'){
      const tq3 = query(collection(db,'tareas_sf'), where('userId','==',userId), where('asignadaPor','!=',userId));
      onSnapshot(tq3, snap => {
        // Merge with self-created tasks (avoid duplicates)
        const assignedIds = new Set(snap.docs.map(d=>d.id));
        snap.forEach(d => {
          if(!window.SF.tasks.find(t=>t.id===d.id)){
            window.SF.tasks.push({id:d.id,...d.data()});
          }
        });
        if(window.SF.currentUser) window.App.renderCurrent();
      }, err => {});
    }
  };

  window.FB = {
    async saveUser(u){ await setDoc(doc(db,'usuarios_sf',u.id),u,{merge:true}) },
    async addTask(t){ return await addDoc(collection(db,'tareas_sf'),t) },
    async updateTask(id,d){ await updateDoc(doc(db,'tareas_sf',id),d) },
    async deleteTask(id){ await deleteDoc(doc(db,'tareas_sf',id)) },
    async saveClass(c){ await setDoc(doc(db,'clases_sf',c.id),c,{merge:true}) },
    async deleteClass(id){ await deleteDoc(doc(db,'clases_sf',id)) },
    async joinClass(classId, studentId){
      const { arrayUnion } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
      await updateDoc(doc(db,'clases_sf',classId),{alumnos: arrayUnion(studentId)});
    },
    async findClassByCode(code){
      const { getDocs } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
      const q = query(collection(db,'clases_sf'), where('codigo','==',code.toUpperCase()));
      const snap = await getDocs(q);
      if(snap.empty) return null;
      const d = snap.docs[0];
      return {id:d.id,...d.data()};
    },
  };

  console.log('[StudyFlow] ✅ Firebase conectado');
} catch(e) {
  console.warn('[StudyFlow] Firebase error, usando localStorage:', e.message);
}
</script>

/* ═══════════════════════════════════════════
   PLANNING ENGINE  (Matemático)
   Priority = difficulty×0.4 + urgency×0.5 + spread×0.1
═══════════════════════════════════════════ */
function generateWeeklyPlan(){
  const user = SF.currentUser;
  if(!user) return {};

  const avail = user.availability || {};
  const now = new Date();
  const todayDow = (now.getDay()+6)%7; // Mon=0

  // Get active tasks sorted by priority
  const activeTasks = SF.tasks.filter(t => {
    const eff = effectiveStatus(t);
    return eff !== 'done' && eff !== 'cancelled' && t.estimatedHours;
  });

  const scored = activeTasks.map(t => {
    const daysLeft = t.deadline
      ? Math.max(1, Math.ceil((new Date(t.deadline)-now)/(1000*60*60*24)))
      : 14;
    const urgency = Math.min(5, 10/daysLeft);
    const diff = parseInt(t.difficulty)||3;
    const priority = diff*0.4 + urgency*0.5;
    return {...t, priority, daysLeft, remainingHours: parseFloat(t.estimatedHours)||1};
  }).sort((a,b) => b.priority - a.priority);

  // Build 7-day schedule
  const plan = {};
  const remaining = scored.map(t => ({...t}));

  for(let d=0; d<7; d++){
    const dow = (todayDow+d)%7;
    const hoursAvail = parseFloat(avail[dow])||0;
    plan[d] = { dow, hoursAvail, sessions:[] };

    if(!hoursAvail) continue;

    let hoursLeft = hoursAvail;
    // Alternate subjects: don't put same subject more than 90min in a row
    const subjectLastUsed = {};

    for(const task of remaining){
      if(hoursLeft <= 0) break;
      if(task.remainingHours <= 0) continue;

      // Max 1.5h per subject per day
      const subjUsed = subjectLastUsed[task.subjectId] || 0;
      if(subjUsed >= 1.5) continue;

      const sessionH = Math.min(
        task.remainingHours,
        hoursLeft,
        1.5 - subjUsed,
        user.level === 'primary' ? 0.5 : 1.5
      );

      if(sessionH < 0.25) continue;

      plan[d].sessions.push({
        taskId: task.id,
        title: task.title,
        subject: task.subjectName,
        subjectColor: task.subjectColor,
        hours: sessionH,
        emoji: task.subjectEmoji || '📚'
      });

      task.remainingHours -= sessionH;
      hoursLeft -= sessionH;
      subjectLastUsed[task.subjectId] = subjUsed + sessionH;
    }
  }

  return plan;
}

/* ═══════════════════════════════════════════
   EXTENDED PLANNING ENGINES
═══════════════════════════════════════════ */

// Returns tasks that fall (deadline) within [startDate, endDate]
function getTasksInRange(startDate, endDate){
  return SF.tasks.filter(t => {
    if(!t.deadline) return false;
    const d = new Date(t.deadline + 'T00:00:00');
    return d >= startDate && d <= endDate;
  });
}

// Build a 30/31 day map: date string -> {tasks, sessions}
function generateMonthPlan(year, month){
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const result = {};
  const weekPlan = generateWeeklyPlan();

  for(let day=1; day<=daysInMonth; day++){
    const date = new Date(year, month, day);
    const dateStr = date.toISOString().slice(0,10);
    const dow = (date.getDay()+6)%7; // Mon=0

    // Tasks with deadline on this day
    const deadlineTasks = SF.tasks.filter(t => t.deadline === dateStr && effectiveStatus(t) !== 'done');

    // Study sessions from weekly plan (repeating pattern)
    const nowDate = new Date(); nowDate.setHours(0,0,0,0);
    const diffDays = Math.round((date - nowDate)/(1000*60*60*24));
    const sessions = (diffDays >= 0 && diffDays < 7 && weekPlan[diffDays])
      ? weekPlan[diffDays].sessions : [];

    result[dateStr] = { date, dow, deadlineTasks, sessions, isToday: dateStr === new Date().toISOString().slice(0,10) };
  }
  return result;
}

/* ═══════════════════════════════════════════
   EFFECTIVE STATUS (same logic as TaskFlow)
═══════════════════════════════════════════ */
function effectiveStatus(task){
  if(task.status==='done'||task.status==='cancelled') return task.status;
  if(task.deadline){
    const end = new Date(task.deadline+'T23:59:59');
    if(new Date()>=end) return 'done';
  }
  return task.status||'pending';
}

            <span style="font-size:11px;color:var(--text3);font-weight:600;margin-left:6px">
              ${date.toLocaleDateString('es-ES',{day:'numeric',month:'short'})}
            </span>
          </div>
          <div class="plan-day-hours">${day.hoursAvail}h disponibles</div>
        </div>
        <div class="plan-sessions">
          ${day.sessions.length===0
            ? `<div class="plan-empty">${day.hoursAvail===0?'Día libre 🎉':'Sin tareas asignadas'}</div>`
            : day.sessions.map(s=>`
              <div class="plan-session">
                <div class="plan-session-color" style="background:${s.subjectColor||'var(--purple)'}"></div>
                <div class="plan-session-body">
                  <div class="plan-session-title">${s.emoji} ${s.title}</div>
                  <div class="plan-session-meta">${s.subject}</div>
                </div>
                <div class="plan-session-time">${formatHours(s.hours)}</div>
                <button class="pom-btn" onclick="startPomodoro(${JSON.stringify(s).replace(/"/g,'&quot;')})" title="Iniciar">▶</button>
              </div>`).join('')}
        </div>
      </div>`;
    }).join('');
  },

  _renderMonthView(){
    const now = new Date();
    const year = SF.planMonthYear ?? now.getFullYear();
    const month = SF.planMonth ?? now.getMonth();
    SF.planMonthYear = year; SF.planMonth = month;

    const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    const plan = generateMonthPlan(year, month);

    // First day of month (Mon=0)
    const firstDow = (new Date(year, month, 1).getDay()+6)%7;
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const prevMonthDays = new Date(year, month, 0).getDate();

    let cells = '';

    // Header
    cells += DAYS.map(d=>`<div class="month-header-cell">${d}</div>`).join('');

    // Prev month padding
    for(let i=firstDow-1; i>=0; i--){
      cells += `<div class="month-cell other-month"><div class="month-day-num">${prevMonthDays-i}</div></div>`;
    }

    // Current month days
    for(let day=1; day<=daysInMonth; day++){
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const info = plan[dateStr] || {};
      const isToday = dateStr === now.toISOString().slice(0,10);
      const deadlines = info.deadlineTasks || [];
      const sessions = info.sessions || [];
      const hasUrgent = deadlines.some(t=>{
        const dLeft = Math.ceil((new Date(t.deadline+'T23:59:59')-now)/(1000*60*60*24));
        return dLeft<=2;
      });

      const taskDots = [
        ...deadlines.slice(0,2).map(t=>`
          <div class="month-task-dot" style="background:${(getSubject(t.subjectId)?.color||'#7c5cfc')}22;color:${getSubject(t.subjectId)?.color||'#7c5cfc'}">
            📌 ${t.title.slice(0,14)}${t.title.length>14?'…':''}
          </div>`),
        ...sessions.slice(0,2).map(s=>`
          <div class="month-task-dot" style="background:${(s.subjectColor||'#7c5cfc')}18;color:${s.subjectColor||'#7c5cfc'}">
            ${s.emoji} ${s.title.slice(0,12)}${s.title.length>12?'…':''}
          </div>`),
      ];
      const extra = deadlines.length + sessions.length - 2;

      cells += `
        <div class="month-cell ${isToday?'today':''} ${deadlines.length+sessions.length>0?'has-tasks':''}">
          <div class="month-day-num">${day}</div>
          ${taskDots.join('')}
          ${extra>0?`<div class="month-overflow">+${extra} más</div>`:''}
        </div>`;
    }

    // Next month padding
    const totalCells = firstDow + daysInMonth;
    const remainder = totalCells % 7;
    if(remainder > 0){
      for(let i=1; i<=7-remainder; i++){
        cells += `<div class="month-cell other-month"><div class="month-day-num">${i}</div></div>`;
      }
    }

    return `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <button class="btn-sec" onclick="prevMonth()" style="padding:6px 12px">‹ Anterior</button>
        <div style="font-size:16px;font-weight:900">${monthNames[month]} ${year}</div>
        <button class="btn-sec" onclick="nextMonth()" style="padding:6px 12px">Siguiente ›</button>
      </div>
      <div class="month-grid">${cells}</div>
      <div style="display:flex;gap:12px;margin-top:8px;font-size:11px;color:var(--text2);font-weight:700">
        <span>📌 Fecha límite</span>
        <span>📚 Sesión de estudio</span>
      </div>`;
  },

  _renderYearView(){
    const now = new Date();
    const year = SF.planYearY ?? now.getFullYear();
    SF.planYearY = year;

    const monthNames = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

    const cards = monthNames.map((mName, month) => {
      const firstDow = (new Date(year, month, 1).getDay()+6)%7;
      const daysInMonth = new Date(year, month+1, 0).getDate();

      // Tasks with deadline this month
      const monthTasks = SF.tasks.filter(t=>{
        if(!t.deadline) return false;
        const d = new Date(t.deadline+'T00:00:00');
        return d.getFullYear()===year && d.getMonth()===month && effectiveStatus(t)!=='done';
      });

      // Task count per day for heat map
      const tasksByDay = {};
      monthTasks.forEach(t=>{
        const d = new Date(t.deadline+'T00:00:00').getDate();
        tasksByDay[d] = (tasksByDay[d]||0)+1;
      });
      const urgentDays = new Set(monthTasks.filter(t=>{
        return Math.ceil((new Date(t.deadline+'T23:59:59')-now)/(1000*60*60*24))<=2;
      }).map(t=>new Date(t.deadline+'T00:00:00').getDate()));

      // Mini calendar cells
      let miniCells = DAYS.map(d=>`<div style="font-size:8px;font-weight:800;color:var(--text3);text-align:center">${d[0]}</div>`).join('');

      // Padding
      for(let i=0;i<firstDow;i++) miniCells+=`<div class="year-mini-cell other-month"></div>`;

      for(let d=1;d<=daysInMonth;d++){
        const isToday = year===now.getFullYear()&&month===now.getMonth()&&d===now.getDate();
        const cls = isToday?'today':urgentDays.has(d)?'has-urgent':tasksByDay[d]?'has-tasks':'';
        miniCells += `<div class="year-mini-cell ${cls}">${d}</div>`;
      }

      // Subject summary for this month
      const subjSummary = {};
      monthTasks.forEach(t=>{
        const s = getSubject(t.subjectId);
        if(!s) return;
        if(!subjSummary[s.id]) subjSummary[s.id]={...s,count:0};
        subjSummary[s.id].count++;
      });

      return `
        <div class="year-month-card">
          <div class="year-month-name">
            <span>${mName}</span>
            ${monthTasks.length>0?`<span style="font-size:11px;background:var(--purple-g);color:var(--purple2);padding:2px 7px;border-radius:10px">${monthTasks.length}</span>`:''}
          </div>
          <div class="year-month-mini">${miniCells}</div>
          ${Object.values(subjSummary).length>0?`
            <div class="year-task-summary">
              ${Object.values(subjSummary).slice(0,3).map(s=>`
                <div class="year-task-chip" style="background:${s.color}18">
                  <div class="year-task-chip-dot" style="background:${s.color}"></div>
                  <span style="color:${s.color}">${s.emoji} ${s.name}</span>
                  <span style="margin-left:auto;color:var(--text3)">${s.count}</span>
                </div>`).join('')}
            </div>` : `<div style="font-size:10px;color:var(--text3);margin-top:8px;text-align:center">Sin tareas</div>`}
        </div>`;
    });

    return `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <button class="btn-sec" onclick="prevYear()" style="padding:6px 12px">‹ ${year-1}</button>
        <div style="font-size:16px;font-weight:900">📆 ${year}</div>
        <button class="btn-sec" onclick="nextYear()" style="padding:6px 12px">${year+1} ›</button>
      </div>
      <div class="year-grid">${cards.join('')}</div>
      <div style="display:flex;gap:12px;margin-top:8px;font-size:11px;color:var(--text2);font-weight:700;flex-wrap:wrap">
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:var(--purple);display:inline-block"></span>Hoy</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:var(--red);display:inline-block"></span>Urgente (≤2 días)</span>
        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--purple-g);border:1px solid var(--purple);display:inline-block"></span>Con tareas</span>
      </div>`;
  },

/* ═══════════════════════════════════════════
   TASK CARDS
═══════════════════════════════════════════ */
function getSubject(id){ return (SF.currentUser?.subjects||[]).find(s=>s.id===id); }

function diffLabel(d){ return ['','🟢 Fácil','🟡 Normal','🟠 Media','🔴 Difícil','💀 Muy difícil'][parseInt(d)||3]; }
function diffColors(d){
  const map = {1:'#4ade80,rgba(74,222,128,.15)',2:'#fbbf24,rgba(251,191,36,.15)',3:'#fb923c,rgba(251,146,60,.15)',4:'#f87171,rgba(248,113,113,.15)',5:'#a855f7,rgba(168,85,247,.15)'};
  const [c,bg] = (map[d]||map[3]).split(',');
  return {c,bg};
}

function taskCard(t){
  const subj = getSubject(t.subjectId);
  const eff = effectiveStatus(t);
  const isDone = eff==='done';
  const daysLeft = t.deadline ? Math.ceil((new Date(t.deadline+'T23:59:59')-new Date())/(1000*60*60*24)) : null;
  const isUrgent = daysLeft !== null && daysLeft <= 2 && !isDone;
  const df = diffColors(t.difficulty);

  return `<div class="task-card ${isDone?'done-card':''} ${isUrgent?'urgent-card':''}"
    style="--task-color:${subj?.color||'var(--purple)'}"
    onclick="openEditTask('${t.id}')">
    <button class="task-check ${isDone?'checked':''}" onclick="event.stopPropagation();toggleDone('${t.id}')">
      ${isDone?'<span style="color:#fff;font-size:13px">✓</span>':''}
    </button>
    <div class="task-body">
      <div class="task-title">${t.title}</div>
      <div class="task-chips">
        ${subj?`<span class="chip chip-subj" style="--chip-bg:${subj.color}22;--chip-color:${subj.color}">${subj.emoji} ${subj.name}</span>`:''}
        ${t.deadline?`<span class="chip chip-date" style="${isUrgent?'background:var(--red-g);color:var(--red)':''}">
          📅 ${isUrgent&&!isDone?'⚠️ ':''} ${formatDate(t.deadline)} ${daysLeft!==null&&!isDone?`(${daysLeft<0?'vencida':daysLeft===0?'hoy':daysLeft+'d'})`:''}</span>`:''}
        ${t.estimatedHours?`<span class="chip chip-time">⏱ ${formatHours(t.estimatedHours)}</span>`:''}
        <span class="chip chip-diff" style="--diff-bg:${df.bg};--diff-color:${df.c}">${diffLabel(t.difficulty)}</span>
        ${isDone?`<span class="chip chip-done">✅ Completada</span>`:''}
        ${t.asignadaPor&&t.asignadaPor!==SF.currentUser?.id?`<span class="chip-assigned">👩‍🏫 ${t.profesorNombre||'Profesor'}</span>`:''}
      </div>
    </div>
    <div class="task-actions" onclick="event.stopPropagation()">
      <button class="task-action-btn" onclick="deleteTask('${t.id}')" title="Eliminar">🗑</button>
    </div>
  </div>`;
}

function miniTaskCard(t){
  const subj = getSubject(t.subjectId);
  const daysLeft = t.deadline ? Math.ceil((new Date(t.deadline+'T23:59:59')-new Date())/(1000*60*60*24)) : null;
  const isUrgent = daysLeft !== null && daysLeft <= 2;
  return `<div class="task-card" style="--task-color:${subj?.color||'var(--purple)'};padding:12px 16px;cursor:pointer" onclick="navigate('tasks')">
    <div class="task-body">
      <div class="task-title" style="font-size:13px">${t.title}</div>
      <div class="task-chips">
        ${subj?`<span class="chip chip-subj" style="--chip-bg:${subj.color}22;--chip-color:${subj.color}">${subj.emoji} ${subj.name}</span>`:''}
        ${t.deadline?`<span class="chip chip-date" style="${isUrgent?'background:var(--red-g);color:var(--red)':''}">📅 ${formatDate(t.deadline)}</span>`:''}
      </div>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════
   TASK MODAL
═══════════════════════════════════════════ */
let modalDifficulty = 3;

function openAddTask(){
  SF.editingTaskId = null;
  modalDifficulty = 3;
  document.getElementById('modalTitle').textContent = '➕ Nueva tarea';
  renderTaskForm({});
  openModal();
}

function openEditTask(id){
  const t = SF.tasks.find(x=>x.id===id);
  if(!t) return;
  SF.editingTaskId = id;
  modalDifficulty = parseInt(t.difficulty)||3;
  document.getElementById('modalTitle').textContent = '✏️ Editar tarea';
  renderTaskForm(t);
  openModal();
}

function renderTaskForm(t={}){
  const subjects = SF.currentUser?.subjects||[];
  document.getElementById('modalBody').innerHTML = `
    <div class="form-group">
      <label class="form-label">Título *</label>
      <input class="form-input" id="tf-title" placeholder="¿Qué tienes que hacer?" value="${escHtml(t.title||'')}">
    </div>
    <div class="form-group">
      <label class="form-label">Asignatura *</label>
      <select class="form-select" id="tf-subj">
        <option value="">— Selecciona asignatura —</option>
        ${subjects.map(s=>`<option value="${s.id}" ${t.subjectId===s.id?'selected':''}>${s.emoji} ${s.name}</option>`).join('')}
      </select>
    </div>
    <div class="form-row">
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">📅 Fecha límite</label>
        <input class="form-input" id="tf-deadline" type="date" value="${t.deadline||''}">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">⏱ Horas estimadas</label>
        <input class="form-input" id="tf-hours" type="number" min="0.5" max="20" step="0.5"
          placeholder="2" value="${t.estimatedHours||''}">
      </div>
    </div>
    <div class="form-group" style="margin-top:18px">
      <label class="form-label">🎯 Dificultad</label>
      <div class="diff-picker">
        ${[1,2,3,4,5].map(d=>`
          <button class="diff-btn ${modalDifficulty===d?'sel':''}" onclick="selDiff(${d})" data-d="${d}">
            ${['','😊','🙂','😐','😰','💀'][d]}
          </button>`).join('')}
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">📝 Notas (opcional)</label>
      <textarea class="form-textarea" id="tf-notes" placeholder="Apuntes, páginas, capítulos...">${escHtml(t.notes||'')}</textarea>
    </div>
    ${SF.editingTaskId?`<button class="btn-sec" onclick="deleteTask('${SF.editingTaskId}');closeModal()" style="width:100%;text-align:center;margin-bottom:10px;color:var(--red);border-color:var(--red)">🗑️ Eliminar tarea</button>`:''}
    <button class="btn-submit" onclick="saveTask()">${SF.editingTaskId?'💾 Guardar cambios':'🚀 Añadir tarea'}</button>
  `;
}

function selDiff(d){
  modalDifficulty = d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.toggle('sel',parseInt(b.dataset.d)===d));
}

async function saveTask(){
  const title = document.getElementById('tf-title')?.value.trim();
  if(!title){ toast('El título es obligatorio','error'); return; }
  const subjId = document.getElementById('tf-subj')?.value;
  if(!subjId){ toast('Selecciona una asignatura','error'); return; }
  const subj = getSubject(subjId);

  const task = {
    title,
    subjectId: subjId,
    subjectName: subj?.name||'',
    subjectColor: subj?.color||'#7c5cfc',
    subjectEmoji: subj?.emoji||'📚',
    deadline: document.getElementById('tf-deadline')?.value||'',
    estimatedHours: parseFloat(document.getElementById('tf-hours')?.value)||1,
    difficulty: modalDifficulty,
    notes: document.getElementById('tf-notes')?.value.trim()||'',
    status: 'pending',
    userId: SF.currentUser.id,
    updatedAt: new Date().toISOString(),
  };

  if(SF.editingTaskId){
    const idx = SF.tasks.findIndex(t=>t.id===SF.editingTaskId);
    if(idx>=0){
      task.id = SF.editingTaskId;
      task.createdAt = SF.tasks[idx].createdAt;
      SF.tasks[idx] = task;
      window.FB?.updateTask(SF.editingTaskId, task).catch(()=>{});
    }
    toast('Tarea actualizada ✏️','info');
  } else {
    task.id = genId();
    task.createdAt = new Date().toISOString();
    SF.tasks.unshift(task);
    if(window.FB){
      window.FB.addTask(task).then(ref=>{
        if(ref){ task.id=ref.id; saveTasks(); }
      }).catch(()=>{});
    }
    toast('Tarea añadida 🚀','success');
  }

  saveTasks();
  closeModal();
  App.renderCurrent();
}

function toggleDone(id){
  const t = SF.tasks.find(x=>x.id===id);
  if(!t) return;
  t.status = effectiveStatus(t)==='done' ? 'pending' : 'done';
  t.updatedAt = new Date().toISOString();
  window.FB?.updateTask(id,{status:t.status,updatedAt:t.updatedAt}).catch(()=>{});
  saveTasks();
  App.renderCurrent();
}

function deleteTask(id){
  if(!confirm('¿Eliminar esta tarea?')) return;
  SF.tasks = SF.tasks.filter(t=>t.id!==id);
  window.FB?.deleteTask(id).catch(()=>{});
  saveTasks();
  closeModal();
  App.renderCurrent();
  toast('Tarea eliminada','info');
}

async function createClass(){

  const cls = {
    id: genId(),
    nombre: name,

function deleteClass(id){

function copyCode(code){

// Student joins a class
function openJoinClass(){
  document.getElementById('modalTitle').textContent = '🏫 Unirme a una clase';
  document.getElementById('modalBody').innerHTML = `
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:40px;margin-bottom:8px">🎒</div>
      <p style="font-size:13px;color:var(--text2)">Pide el código a tu profesor y escríbelo aquí</p>
    </div>
    <div class="form-group">
      <label class="form-label">Código de clase</label>
      <input class="form-input" id="join-code" placeholder="Ej: AB3X7K"
        maxlength="6" style="text-align:center;font-size:22px;font-weight:900;letter-spacing:6px;text-transform:uppercase"
        oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter')joinClass()">
    </div>
    <div class="login-error" id="join-error"></div>
    <button class="btn-submit" onclick="joinClass()">🚀 Unirme a la clase</button>
  `;
  openModal();
  setTimeout(()=>document.getElementById('join-code')?.focus(),100);
}

async function joinClass(){
  const code = document.getElementById('join-code')?.value.trim().toUpperCase();
  const errEl = document.getElementById('join-error');
  if(!code || code.length!==6){
    errEl.textContent='El código debe tener 6 caracteres'; errEl.style.display='block'; return;
  }
  errEl.style.display='none';

  // Search locally first
  let cls = SF.classes.find(c=>c.codigo===code);

  // Then search Firebase
  if(!cls && window.FB?.findClassByCode){
    try {
      cls = await window.FB.findClassByCode(code);
    } catch(e){ console.warn(e); }
  }

  if(!cls){
    errEl.textContent='Código no encontrado. Comprueba con tu profesor.';
    errEl.style.display='block'; return;
  }

  const uid = SF.currentUser.id;
  if(cls.alumnos?.includes(uid)){
    errEl.textContent='Ya estás en esta clase.';
    errEl.style.display='block'; return;
  }

  // Join
  if(!SF.classes.find(c=>c.id===cls.id)) SF.classes.push(cls);
  cls.alumnos = [...(cls.alumnos||[]), uid];
  // Update locally
  const idx = SF.classes.findIndex(c=>c.id===cls.id);
  if(idx>=0) SF.classes[idx] = cls;
  saveClasses();

  // Firebase
  if(window.FB?.joinClass){
    await window.FB.joinClass(cls.id, uid).catch(()=>{});
  } else {
    await window.FB?.saveClass(cls).catch(()=>{});
  }

  closeModal();
  toast(`¡Unido a "${cls.nombre}" 🎉`,'success');
  App.renderCurrent();
}

// Teacher assigns a task to all students in a class
function openAssignTask(classId){
  const cls = SF.classes.find(c=>c.id===classId);
  if(!cls) return;
  SF.editingClassId = classId;
  SF.assignTargetStudentId = null;

  renderAssignTaskForm(cls, null);

}

// Teacher assigns a task to one specific student
function openAssignTaskToStudent(classId, studentId){
  const cls = SF.classes.find(c=>c.id===classId);
  const student = SF.users.find(u=>u.id===studentId);
  if(!cls||!student) return;
  SF.editingClassId = classId;
  SF.assignTargetStudentId = studentId;
  document.getElementById('modalTitle').textContent = `📝 Tarea para ${student.name}`;
  renderAssignTaskForm(cls, student);
  openModal();
}

function renderAssignTaskForm(cls, student){
  document.getElementById('modalBody').innerHTML = `
    ${student ? `
      <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border-radius:var(--r-sm);margin-bottom:16px">
        <div style="width:32px;height:32px;border-radius:50%;background:${student.color||'#7c5cfc'};display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff">${student.name[0]}</div>
        <span style="font-weight:700">${student.name}</span>
        <span style="font-size:11px;color:var(--text2);margin-left:auto">${cls.nombre}</span>
      </div>` : `
      <div style="padding:8px 12px;background:var(--purple-g);border-radius:var(--r-sm);margin-bottom:16px;font-size:12px;color:var(--purple2);font-weight:700">
        📢 Esta tarea se asignará a todos los alumnos de la clase (${(cls.alumnos||[]).length})
      </div>`}
    <div class="form-group">
      <label class="form-label">Título *</label>
      <input class="form-input" id="at-title" placeholder="Ej: Ejercicios tema 3">
    </div>
    <div class="form-row">
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">📅 Fecha límite</label>
        <input class="form-input" id="at-deadline" type="date">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">⏱ Horas estimadas</label>
        <input class="form-input" id="at-hours" type="number" min="0.5" max="20" step="0.5" placeholder="1">
      </div>
    </div>
    <div class="form-group" style="margin-top:18px">
      <label class="form-label">📝 Instrucciones</label>
      <textarea class="form-textarea" id="at-notes" placeholder="Páginas, capítulos, instrucciones..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">🎯 Dificultad</label>
      <div class="diff-picker">
        ${[1,2,3,4,5].map(d=>`<button class="diff-btn ${d===3?'sel':''}" onclick="selDiff(${d})" data-d="${d}">${['','😊','🙂','😐','😰','💀'][d]}</button>`).join('')}
      </div>
    </div>
    <button class="btn-submit" onclick="saveAssignedTask()">📤 Asignar tarea</button>
  `;
  modalDifficulty = 3;
}

async function saveAssignedTask(){
  const title = document.getElementById('at-title')?.value.trim();
  if(!title){ toast('El título es obligatorio','error'); return; }

  const cls = SF.classes.find(c=>c.id===SF.editingClassId);
  if(!cls) return;

  const targetStudents = SF.assignTargetStudentId
    ? [SF.assignTargetStudentId]
    : (cls.alumnos||[]);

  if(!targetStudents.length){ toast('No hay alumnos en esta clase','error'); return; }

  const baseTask = {
    title,
    deadline: document.getElementById('at-deadline')?.value||'',
    estimatedHours: parseFloat(document.getElementById('at-hours')?.value)||1,
    notes: document.getElementById('at-notes')?.value.trim()||'',
    difficulty: modalDifficulty,
    status: 'pending',
    asignadaPor: SF.currentUser.id,
    profesorNombre: SF.currentUser.name,
    claseId: cls.id,
    claseNombre: cls.nombre,
    subjectId: '',
    subjectName: cls.nombre,
    subjectColor: '#7c5cfc',
    subjectEmoji: '👩‍🏫',
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString(),
  };

  let count = 0;
  for(const studentId of targetStudents){
    const task = {...baseTask, id:genId(), userId:studentId};
    if(window.FB?.addTask){
      await window.FB.addTask(task).catch(()=>{});
    }
    count++;
  }

  closeModal();
  toast(`Tarea asignada a ${count} alumno${count!==1?'s':''} ✅`,'success');
  App.renderCurrent();
}

function addSubject(){
  const name = document.getElementById('newSubjName')?.value.trim();
  if(!name){ toast('Escribe el nombre de la asignatura','error'); return; }
  const emoji = document.getElementById('newSubjEmoji')?.value||'📚';
  const usedColors = (SF.currentUser.subjects||[]).map(s=>s.color);
  const color = SUBJ_COLORS.find(c=>!usedColors.includes(c)) || SUBJ_COLORS[Math.floor(Math.random()*SUBJ_COLORS.length)];
  const subj = { id:genId(), name, emoji, color };
  SF.currentUser.subjects = [...(SF.currentUser.subjects||[]), subj];
  document.getElementById('newSubjName').value='';
  App.renderProfile();
}

function deleteSubject(id){
  if(!confirm('¿Eliminar esta asignatura?')) return;
  SF.currentUser.subjects = (SF.currentUser.subjects||[]).filter(s=>s.id!==id);
  App.renderProfile();
}

function saveProfile(){
  // Save availability
  const avail = {};
  for(let i=0;i<7;i++){
    avail[i] = parseFloat(document.getElementById('avail-'+i)?.value||0)||0;
  }
  SF.currentUser.availability = avail;

  // Update in users list
  const idx = SF.users.findIndex(u=>u.id===SF.currentUser.id);
  if(idx>=0) SF.users[idx] = SF.currentUser;
  saveUsers();
  window.FB?.saveUser(SF.currentUser).catch(()=>{});
  toast('Perfil guardado ✅','success');
  App.renderCurrent();
}

/* ═══════════════════════════════════════════
   POMODORO
═══════════════════════════════════════════ */
function startPomodoro(session){
  SF.pomSession = session;
  SF.pomSeconds = SF.currentUser?.level==='primary' ? 20*60 : 25*60;
  SF.pomRunning = true;
  startPomTimer();
  App.renderPlan();
  toast(`▶ Iniciando: ${session.title}`,'info');
}

function togglePomodoro(){
  SF.pomRunning = !SF.pomRunning;
  if(SF.pomRunning) startPomTimer();
  else { clearInterval(SF.pomTimer); SF.pomTimer=null; }
  App.renderPlan();
}

function setPlanView(v){
  SF.planView = v;
  App.renderPlan();
}

function prevMonth(){
  const now = new Date();
  let m = SF.planMonth ?? now.getMonth();
  let y = SF.planMonthYear ?? now.getFullYear();
  m--; if(m<0){ m=11; y--; }
  SF.planMonth=m; SF.planMonthYear=y;
  App.renderPlan();
}
function nextMonth(){
  const now = new Date();
  let m = SF.planMonth ?? now.getMonth();
  let y = SF.planMonthYear ?? now.getFullYear();
  m++; if(m>11){ m=0; y++; }
  SF.planMonth=m; SF.planMonthYear=y;
  App.renderPlan();
}
function prevYear(){
  SF.planYearY = (SF.planYearY ?? new Date().getFullYear()) - 1;
  App.renderPlan();
}
function nextYear(){
  SF.planYearY = (SF.planYearY ?? new Date().getFullYear()) + 1;
  App.renderPlan();
}

function stopPomodoro(){
  clearInterval(SF.pomTimer);
  SF.pomTimer=null;
  SF.pomSession=null;
  SF.pomRunning=false;
  SF.pomSeconds = 25*60;
  App.renderPlan();
}

function startPomTimer(){
  clearInterval(SF.pomTimer);
  SF.pomTimer = setInterval(()=>{
    SF.pomSeconds--;
    if(SF.pomSeconds<=0){
      clearInterval(SF.pomTimer);
      SF.pomRunning=false;
      toast('🎉 ¡Sesión completada! Tómate un descanso.','success');
      SF.pomSession=null;
    }
    // Update timer display without full re-render
    const timerEl = document.querySelector('.pom-timer');
    if(timerEl) timerEl.textContent = formatPomTime(SF.pomSeconds);
    // Update ring
    const ring = document.querySelector('.pom-progress-ring circle:last-child');
    const total = SF.currentUser?.level==='primary'?20*60:25*60;
    if(ring) ring.setAttribute('stroke-dashoffset', 125.6*(1-SF.pomSeconds/total));
    if(SF.pomSeconds<=0) App.renderPlan();
  },1000);
}

function formatPomTime(s){
  const m=Math.floor(s/60), sec=s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function openModal(){
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){

}
function closeModalOutside(e){
  if(e.target===document.getElementById('modalOverlay')) closeModal();
}

/* ═══════════════════════════════════════════
   UTILS
═══════════════════════════════════════════ */
function setPageContent(html){
  document.getElementById('pageContent').innerHTML = html;
}

function toast(msg, type='info'){
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(()=>t.remove(),3500);
}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function formatDate(d){
  if(!d) return '';
  const date = new Date(d+'T00:00:00');
  return date.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
}

function formatHours(h){
  const n = parseFloat(h)||0;
  if(n<1) return `${Math.round(n*60)}min`;
  if(n===Math.floor(n)) return `${n}h`;
  return `${Math.floor(n)}h ${Math.round((n%1)*60)}min`;
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeModal();
});
